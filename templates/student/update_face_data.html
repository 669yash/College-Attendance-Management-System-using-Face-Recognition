{% extends 'base.html' %}
{% block title %}Update Face Data{% endblock %}
{% block content %}
<div class="max-w-xl mx-auto bg-white rounded shadow p-6">
  <h1 class="text-2xl font-bold mb-4">Update Face Data</h1>
  <p class="text-sm text-gray-600 mb-4">Upload 4–5 clear face images. Existing images will be replaced.</p>
  <form method="POST" enctype="multipart/form-data" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Images</label>
      <input type="file" name="face_images" multiple accept="image/*" class="w-full" />
    </div>
    <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-2 px-4 rounded">Upload</button>
  </form>
</div>
{% endblock %}
