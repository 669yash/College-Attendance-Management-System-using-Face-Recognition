{% extends "base.html" %}

{% block title %}500 - Internal Server Error{% endblock %}

{% block content %}
<div class="text-center py-16">
    <h1 class="text-6xl font-bold text-gray-800 mb-4">500</h1>
    <p class="text-xl text-gray-600 mb-8">Internal Server Error</p>
    <p class="text-gray-500 mb-8">Something went wrong. Please try again later.</p>
    <a href="{{ url_for('auth.login') }}" class="bg-blue-900 hover:bg-blue-800 text-white font-semibold py-2 px-6 rounded-lg transition duration-200">
        Go to Home
    </a>
</div>
{% endblock %}
