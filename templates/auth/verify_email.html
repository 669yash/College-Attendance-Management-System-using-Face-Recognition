{% extends "base.html" %}

{% block title %}Verify Email - College Attendance System{% endblock %}

{% block content %}
<div class="max-w-md mx-auto bg-white rounded-lg shadow-lg p-6 md:p-8 mt-8 md:mt-12">
    <h2 class="text-2xl md:text-3xl font-bold text-center text-gray-800 mb-6 md:mb-8">Email Verification</h2>
    <form method="POST" action="{{ url_for('auth.verify_email') }}" class="space-y-6">
        <input type="hidden" name="email" value="{{ email }}" />
        <div>
            <label for="otp" class="block text-sm font-medium text-gray-700 mb-2">Enter OTP</label>
            <input type="text"
                   id="otp"
                   name="otp"
                   required
                   class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                   placeholder="6-digit code">
        </div>
        <button type="submit"
                class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-3 px-4 rounded-lg transition duration-200 shadow-md">
            Verify
        </button>
    </form>
    <form method="POST" action="{{ url_for('auth.resend_otp') }}" class="mt-4">
        <input type="hidden" name="email" value="{{ email }}" />
        <button id="resendBtn" type="submit" class="w-full bg-gray-600 hover:bg-gray-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200 shadow-md" disabled>
            Resend OTP (wait 30s)
        </button>
        <p id="countdown" class="text-xs text-gray-500 mt-2">30 seconds remaining</p>
    </form>
    <div class="mt-6 text-center">
        <p class="text-sm text-gray-600">
            Didn’t receive the code? Please check spam or re-register.
        </p>
    </div>
    <div class="mt-4 text-center">
        <a href="{{ url_for('auth.register') }}" class="text-blue-600 hover:text-blue-800 font-semibold">Back to Register</a>
    </div>
    </div>
<script>
let remaining = 30;
const btn = document.getElementById('resendBtn');
const cd = document.getElementById('countdown');
const timer = setInterval(() => {
  remaining -= 1;
  if (remaining <= 0) {
    clearInterval(timer);
    btn.disabled = false;
    cd.textContent = 'You can resend the OTP now';
  } else {
    cd.textContent = remaining + ' seconds remaining';
  }
}, 1000);
</script>
{% endblock %}
