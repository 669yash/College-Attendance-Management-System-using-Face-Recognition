{% extends 'base.html' %}
{% block title %}Reset Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded shadow p-6">
  <h1 class="text-2xl font-bold mb-4">Reset Password</h1>
  <form method="POST" action="{{ url_for('auth.reset_password') }}" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
      <input type="email" name="email" value="{{ email or '' }}" required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">OTP</label>
      <input type="text" name="otp" required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" placeholder="Enter 6-digit code" />
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">New Password</label>
      <input type="password" id="new_password" name="new_password" required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" placeholder="Enter new password" />
      <ul class="mt-2 space-y-1 text-xs" id="pw_rules">
        <li id="rule_len" class="flex items-center gap-2"><span class="icon"></span>8+ characters</li>
        <li id="rule_uc" class="flex items-center gap-2"><span class="icon"></span>Uppercase letter</li>
        <li id="rule_lc" class="flex items-center gap-2"><span class="icon"></span>Lowercase letter</li>
        <li id="rule_num" class="flex items-center gap-2"><span class="icon"></span>Number</li>
        <li id="rule_sp" class="flex items-center gap-2"><span class="icon"></span>Special character</li>
      </ul>
    </div>
    <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-2 px-4 rounded">Reset Password</button>
  </form>
</div>
{% endblock %}
{% block scripts %}
<script>
  const np = document.getElementById('new_password');
  function setRule(el, ok){
    if(!el) return;
    const icon = el.querySelector('.icon');
    if(ok){
      el.className = 'flex items-center gap-2 text-green-700';
      icon.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M16.704 5.293a1 1 0 010 1.414l-7.5 7.5a1 1 0 01-1.414 0l-3.5-3.5a1 1 0 111.414-1.414l2.793 2.793 6.793-6.793a1 1 0 011.414 0z" clip-rule="evenodd"/></svg>';
    }else{
      el.className = 'flex items-center gap-2 text-red-700';
      icon.innerHTML = '<svg width="14" height="14" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M18 10A8 8 0 11.001 9.999 8 8 0 0118 10zm-8-5a1 1 0 00-1 1v4a1 1 0 102 0V6a1 1 0 00-1-1zm0 8a1.5 1.5 0 100 3 1.5 1.5 0 000-3z" clip-rule="evenodd"/></svg>';
    }
  }
  function update(){
    const v = np.value||'';
    setRule(document.getElementById('rule_len'), v.length>=8);
    setRule(document.getElementById('rule_uc'), /[A-Z]/.test(v));
    setRule(document.getElementById('rule_lc'), /[a-z]/.test(v));
    setRule(document.getElementById('rule_num'), /\d/.test(v));
    setRule(document.getElementById('rule_sp'), /[^A-Za-z0-9]/.test(v));
  }
  np && np.addEventListener('input', update);
  update();
</script>
{% endblock %}
