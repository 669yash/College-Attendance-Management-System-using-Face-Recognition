{% extends 'base.html' %}
{% block title %}Forgot Password{% endblock %}
{% block content %}
<div class="max-w-md mx-auto bg-white rounded shadow p-6">
  <h1 class="text-2xl font-bold mb-4">Forgot Password</h1>
  <form method="POST" action="{{ url_for('auth.forgot_password') }}" class="space-y-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
      <input type="email" name="email" required class="w-full px-4 py-2 border border-gray-300 rounded focus:ring-2 focus:ring-blue-500" placeholder="Enter your email" />
    </div>
    <button type="submit" class="w-full bg-blue-900 hover:bg-blue-800 text-white font-semibold py-2 px-4 rounded">Send OTP</button>
  </form>
</div>
{% endblock %}
